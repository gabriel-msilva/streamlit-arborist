name: Build Frontend
description: Set up Node.js and build a frontend application
inputs:
  path:
    description: Path to the frontend directory
    required: false
    default: ./streamlit_arborist/frontend
  node-version:
    description: Node.js version
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.path }}/package-lock.json

    - name: Install dependencies
      shell: bash
      run: npm clean-install
      working-directory: ${{ inputs.path }}

    - name: Build frontend
      shell: bash
      run: npm run build
      working-directory: ${{ inputs.path }}
